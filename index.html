<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptimalCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-bg: #f0f0f0;
            --mc-dirt: #4b3b2a;
            --mc-green: #3fb33f;
            --mc-button: #bebebe;
            --mc-button-hover: #e0e0e0;
            --white: #ffffff;
            --danger: #ff4747;
            --text: #2c2c2c;
            --border-pixel: 4px solid #000;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--mc-bg);
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); /* Textura sutil de cubos */
            color: var(--text);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* Estilo Minecraft para Títulos */
        .mc-font { font-family: 'VT323', monospace; text-transform: uppercase; }

        header {
            background: var(--white);
            padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid #ddd;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 40px; height: 40px; image-rendering: pixelated; }

        .container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }

        /* Cajas de Interfaz */
        .mc-card {
            background: var(--white);
            border: 4px solid #000;
            padding: 30px;
            width: 100%; max-width: 450px;
            position: relative;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
        }

        /* Botones Estilo Minecraft */
        .mc-btn {
            display: block; width: 100%;
            padding: 12px; margin: 10px 0;
            background: var(--mc-button);
            border: 3px solid #000;
            border-bottom-width: 6px;
            color: #000; text-align: center;
            text-decoration: none; cursor: pointer;
            font-weight: bold; font-family: 'VT323', monospace; font-size: 1.5rem;
            transition: all 0.1s;
        }
        .mc-btn:hover { background: var(--mc-button-hover); transform: translateY(-2px); }
        .mc-btn:active { border-bottom-width: 3px; transform: translateY(2px); }
        .mc-btn-green { background: var(--mc-green); color: white; }
        .mc-btn-danger { background: var(--danger); color: white; }

        input, select {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 2px solid #000; border-radius: 0;
            font-family: 'Inter', sans-serif; font-size: 1rem;
        }

        .hidden { display: none !important; }

        /* Icono de Engranaje */
        .settings-icon {
            cursor: pointer; font-size: 24px; transition: transform 0.3s;
        }
        .settings-icon:hover { transform: rotate(90deg); }

        /* Staff Chat UI */
        #staff-chat-box {
            height: 200px; overflow-y: auto; background: #eee;
            padding: 10px; border: 2px solid #000; margin-bottom: 10px;
            text-align: left; font-size: 0.9rem;
        }

        .perm-badge {
            display: inline-block; padding: 2px 8px; background: #ddd;
            font-size: 0.7rem; border-radius: 3px; margin: 2px;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://minecraft.net/static/theme/img/favicon.ico" class="logo-img">
            <h1 class="mc-font" style="margin:0; font-size: 1.8rem;">OptimalCraft Auth</h1>
        </div>
        <div id="user-nav" class="hidden">
            <span id="display-name" style="margin-right: 15px; font-weight: bold;"></span>
            <span class="settings-icon" onclick="showSettings()">⚙️</span>
        </div>
    </header>

    <div class="container">
        <div id="login-section" class="mc-card">
            <h2 class="mc-font" style="text-align:center;">Iniciar Sesión</h2>
            <input type="email" id="email-input" placeholder="Correo Electrónico">
            <input type="password" id="pass-input" placeholder="Contraseña">
            <button class="mc-btn mc-btn-green" onclick="login()">ENTRAR</button>
            <p id="login-error" class="hidden" style="color: var(--danger); text-align: center;"></p>
        </div>

        <div id="staff-section" class="mc-card hidden">
            <h2 class="mc-font" style="margin-top:0;">Panel Principal</h2>
            <div id="staff-buttons"></div>
            
            <hr style="border: 1px solid #ddd; margin: 20px 0;">
            <h3 class="mc-font">💬 Staff Chat Privado</h3>
            <div id="staff-chat-box">
                <div style="color: #666;">Sistema: Bienvenido al canal privado.</div>
            </div>
            <input type="text" id="chat-msg" placeholder="Escribir mensaje...">
            
            <button class="mc-btn" onclick="logout()" style="margin-top: 20px;">SALIR DEL JUEGO</button>
        </div>

        <div id="settings-section" class="mc-card hidden">
            <h2 class="mc-font">Configuración de Cuenta</h2>
            <div id="settings-content">
                </div>
            <button class="mc-btn" onclick="backToPanel()">VOLVER</button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN API (Mantenida de tu código) ---
        const BIN_ID = "69acbbedae596e708f6ae72b"; 
        const API_KEY = "$2a$10$Axc/bU98eP8gJ.xFYRIA8OL.1yGeVRU6tzUigKHgfKKKKo8QBiSyu"; 
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let db = { users: [] };
        let currentUser = null;

        async function loadDatabase() {
            try {
                const response = await fetch(`${URL}/latest`, { headers: { "X-Master-Key": API_KEY } });
                const data = await response.json();
                db = data.record;
            } catch (e) { console.error("Error cargando DB"); }
        }

        async function saveDatabase() {
            await fetch(URL, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(db)
            });
        }

        // --- LÓGICA DE LOGIN ---
        function login() {
            const email = document.getElementById('email-input').value.toLowerCase();
            const pass = document.getElementById('pass-input').value;
            const user = db.users.find(u => u.email === email && u.password === pass);

            if (user) {
                currentUser = user;
                document.getElementById('display-name').innerText = user.email.split('@')[0];
                document.getElementById('user-nav').classList.remove('hidden');
                loadPanel();
            } else {
                const err = document.getElementById('login-error');
                err.innerText = "Datos incorrectos";
                err.classList.remove('hidden');
            }
        }

        function hasPerm(perm) {
            return currentUser.permissions.includes("owner.auth") || currentUser.permissions.includes(perm);
        }

        function loadPanel() {
            switchSection('staff-section');
            const btnContainer = document.getElementById('staff-buttons');
            btnContainer.innerHTML = '';

            if (hasPerm('button.normativas')) {
                btnContainer.innerHTML += `<a href="#" class="mc-btn">📚 NORMATIVAS</a>`;
            }
            if (hasPerm('button.stafflist')) {
                btnContainer.innerHTML += `<a href="#" class="mc-btn">📋 STAFF LIST</a>`;
            }
        }

        // --- SECCIÓN DE CONFIGURACIÓN (REQUERIMIENTO) ---
        function showSettings() {
            switchSection('settings-section');
            const content = document.getElementById('settings-content');
            content.innerHTML = `<p><strong>Email:</strong> ${currentUser.email}</p>`;
            
            // Verificar permiso configuration.access
            if (hasPerm('configuration.access')) {
                content.innerHTML += `
                    <div style="border: 1px solid #ccc; padding: 10px; margin-top: 10px;">
                        <h4 class="mc-font">Cambiar Contraseña</h4>
                        <input type="password" id="new-pass" placeholder="Nueva Contraseña">
                        <button class="mc-btn mc-btn-green" onclick="updatePassword()">ACTUALIZAR</button>
                    </div>
                    <div style="margin-top: 20px;">
                        <button class="mc-btn mc-btn-danger" onclick="deleteOwnAccount()">ELIMINAR CUENTA</button>
                    </div>
                `;
            } else {
                content.innerHTML += `<p style="color:red;">No tienes permiso para modificar esta cuenta (configuration.access).</p>`;
            }
        }

        async function updatePassword() {
            const newPass = document.getElementById('new-pass').value;
            if (newPass.length < 4) return alert("Contraseña muy corta");
            
            currentUser.password = newPass;
            await saveDatabase();
            alert("Contraseña actualizada con éxito.");
        }

        async function deleteOwnAccount() {
            if (confirm("¿ESTÁS SEGURO? Esta acción no se puede deshacer.")) {
                db.users = db.users.filter(u => u.email !== currentUser.email);
                await saveDatabase();
                location.reload();
            }
        }

        // --- UTILIDADES ---
        function switchSection(id) {
            ['login-section', 'staff-section', 'settings-section'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function backToPanel() { switchSection('staff-section'); }

        function logout() { location.reload(); }

        loadDatabase();
    </script>
</body>
</html>
