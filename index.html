<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptimalCraft | Staff Team 2026 © </title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-orange: #ff6600;
            --deep-red: #cc2b00;
            --autumn-gold: #ff9d00;
            --owner-cyan: #ff4000;
            --glow: 0 0 20px rgba(255, 102, 0, 0.7);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif;
            background: black; height: 100vh; display: flex; flex-direction: column;
            color: white; overflow: hidden;
        }
        .background-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(43, 27, 18, 0.8) 0%, rgba(0, 0, 0, 0.7) 100%), 
                        url('https://media.forgecdn.net/attachments/description/1368791/description_41ba0819-a458-4ed3-a44e-ed4af39d9009.png');
            background-size: cover; background-position: center; z-index: -2;
        }
        header {
            display: flex; justify-content: center; align-items: center;
            padding: 25px; background: rgba(0, 0, 0, 0.6);
            border-bottom: 2px solid var(--neon-orange);
            backdrop-filter: blur(10px); box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'Orbitron', sans-serif; color: var(--neon-orange);
            text-shadow: 0 0 10px var(--deep-red); margin: 0 20px 0 0;
            font-size: 2.2rem; letter-spacing: 5px;
        }
        .logo-img { height: 60px; filter: drop-shadow(0 0 8px var(--neon-orange)); }
        .container { flex-grow: 1; display: flex; justify-content: center; align-items: center; z-index: 5; }
        .glass-box {
            background: rgba(20, 10, 5, 0.92); padding: 40px; border-radius: 5px;
            border-left: 5px solid var(--neon-orange); border-right: 1px solid var(--autumn-gold);
            box-shadow: 0 0 40px rgba(0,0,0,0.8); text-align: center;
            width: 95%; max-width: 500px;
        }
        .owner-border { border-left-color: var(--owner-cyan); border-right-color: var(--owner-cyan); }
        input[type="password"] {
            width: 100%; padding: 15px; background: rgba(255, 102, 0, 0.1);
            border: 1px solid rgba(255, 102, 0, 0.3); border-bottom: 2px solid var(--neon-orange);
            color: white; font-family: 'Orbitron', sans-serif; text-align: center;
            margin-bottom: 25px; outline: none;
        }
        .btn {
            background: transparent; color: white; border: 1px solid var(--neon-orange);
            padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            width: 100%; margin: 10px 0; display: block; text-decoration: none; transition: 0.4s;
        }
        .btn:hover { background: var(--neon-orange); color: black; box-shadow: var(--glow); transform: translateY(-2px); }
        .btn-demote { border-color: #ff0000; color: #ff0000; margin-top: 20px; }
        .btn-demote:hover { background: #ff0000; color: white; box-shadow: 0 0 20px #ff0000; }
        #new-pass-display {
            background: #111; padding: 10px; margin-top: 10px;
            border: 1px dashed #ff0000; color: #ff0000; font-family: monospace; cursor: pointer;
        }
        .hidden { display: none !important; }
        .particle { position: absolute; background: var(--neon-orange); pointer-events: none; opacity: 0.4; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="background-overlay"></div>
    <div id="particles-container"></div>

    <header>
        <h1>OptimalCraft Network</h1>
        <img src="imagen.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
    </header>

    <div class="container">
        <div id="login-section" class="glass-box">
            <h2 id="status-text">Cargando Pagina Web....</h2>
            <div id="login-controls" class="hidden">
                <input type="password" id="pass-input" placeholder="Pon La Contraseña.">
                <button class="btn" onclick="checkPassword()">Login</button>
            </div>
        </div>

        <div id="staff-section" class="glass-box hidden">
            <h2 style="color: #ff4000;">STAFF DOCUMENTS</h2>
            <a href="https://docs.google.com/document/d/1bUGwukzoYvFJviaUB2NsaLOLLVBByi4ikZP41EcnOG0/edit?usp=sharing" target="_blank" class="btn">• Normativas Staff-Team •</a>
            <a href="https://docs.google.com/spreadsheets/d/1ka38cZqSxF8E9_f7tG0pccYaU7OO-P9rboCw3RB6iXQ/edit?usp=sharing" target="_blank" class="btn">• Staff List •</a>
        </div>

        <div id="owner-section" class="glass-box owner-border hidden">
            <h2 style="color: var(--owner-orange);">Management Panel</h2>
            <a href="https://docs.google.com/document/d/1bUGwukzoYvFJviaUB2NsaLOLLVBByi4ikZP41EcnOG0/edit?usp=sharing" target="_blank" class="btn">• Normativas Staff-Team •</a>
            <a href="https://docs.google.com/spreadsheets/d/1ka38cZqSxF8E9_f7tG0pccYaU7OO-P9rboCw3RB6iXQ/edit?usp=sharing" target="_blank" class="btn">• Staff List •</a>
            <button id="demote-btn" class="btn btn-demote" onclick="generateNewPass()">⚠ DEMOTE SECURITY (GLOBAL) ⚠</button>
            <div id="pass-result-area" class="hidden">
                <p style="font-size: 0.8rem; margin: 5px 0;">Nueva Contraseña</p>
                <div id="new-pass-display" onclick="copyPass()"></div>
            </div>
        </div>
    </div>

    <script>
        const BIN_ID = "69acbbedae596e708f6ae72b"; 
        const API_KEY = "$2a$10$Axc/bU98eP8gJ.xFYRIA8OL.1yGeVRU6tzUigKHgfKKKKo8QBiSyu"; 
        const OWNER_PASS = "0PT1M4LCR4FT-OWN3RSH1P";
        let CURRENT_STAFF_PASS = "";
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        async function loadSecurity() {
            try {
                const response = await fetch(`${URL}/latest`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                const data = await response.json();
                CURRENT_STAFF_PASS = data.record.staff_password;
                document.getElementById('status-text').innerText = "OPTIMALCRAFT LOGIN";
                document.getElementById('login-controls').classList.remove('hidden');
            } catch (e) {
                document.getElementById('status-text').innerText = "ERROR DE RED";
            }
        }

        function checkPassword() {
            const input = document.getElementById('pass-input').value;
            if (input === OWNER_PASS) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('owner-section').classList.remove('hidden');
            } else if (input === CURRENT_STAFF_PASS) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('staff-section').classList.remove('hidden');
            } else {
                alert("CONTRASEÑA INCORRECTA");
            }
        }

        async function generateNewPass() {
            const btn = document.getElementById('demote-btn');
            btn.innerText = "";
            btn.disabled = true;

            const base = "0PT1M4LCR4FTST4FF";
            let newPass = "Cambiando Contraseña...";
            for (let i = 0; i < base.length; i++) {
                let r = Math.floor(Math.random() * 3);
                if (r === 0) newPass += base[i].toLowerCase();
                else if (r === 1) newPass += base[i].toUpperCase();
                else newPass += Math.floor(Math.random() * 10);
            }

            try {
                const response = await fetch(URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify({ staff_password: newPass })
                });

                if (response.ok) {
                    CURRENT_STAFF_PASS = newPass;
                    document.getElementById('new-pass-display').innerText = newPass;
                    document.getElementById('pass-result-area').classList.remove('hidden');
                    navigator.clipboard.writeText(newPass);
                    alert("Contraseña Cambiada.");
                }
            } catch (e) {
                alert("Error al conectar con JSONBin.");
            } finally {
                btn.innerText = "Demote Security";
                btn.disabled = false;
            }
        }

        function copyPass() {
            navigator.clipboard.writeText(document.getElementById('new-pass-display').innerText);
            alert("Contraseña Copiada");
        }

        (function() {
            setInterval(function() {
                const start = new Date().getTime();
                debugger;
                if (new Date().getTime() - start > 100) window.location.reload();
            }, 2000);
        })();

        function createParticles() {
            const container = document.getElementById('particles-container');
            for(let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2 + 'px';
                p.style.width = p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-10px';
                p.style.animationDuration = Math.random() * 3 + 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        document.addEventListener('contextmenu', e => e.preventDefault());
        loadSecurity();
    </script>
</body>
</html>
